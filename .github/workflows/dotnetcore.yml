name: Deploy ASP.NET Core app to Azure Web App

on:
  push:
    paths-ignore:
      - '*.md'
    branches:
      - master
# CONFIGURATION
# For help, go to https://github.com/Azure/Actions
#
# 1. Set up the following secrets in your repository:
#   AZURE_WEBAPP_PUBLISH_PROFILE
#
# 2. Change these variables for your configuration:
env:
  AZURE_WEBAPP_NAME: jeffpardy    # set this to your application's name
  AZURE_WEBAPP_PACKAGE_PATH: '.'      # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '10.0'           # set this to the dot net version to use

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      # Checkout the repo
      - uses: actions/checkout@v5
      
      # Setup .NET Core SDK
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }} 
      
      # Run dotnet build and publish
      - name: dotnet build and publish
        run: |
          dotnet build --configuration Release
          dotnet publish src/backend/Jeffpardy.csproj -c Release -o '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/myapp' 

      # Smoke test: start the published app and verify health endpoint responds
      - name: Smoke test - verify server starts and health endpoint responds
        run: |
          cd '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/myapp'
          ASPNETCORE_URLS="http://localhost:5000" dotnet Jeffpardy.dll &
          SERVER_PID=$!

          # Wait for the server to start (up to 30 seconds)
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:5000/api/health 2>/dev/null; then
              echo "Server started successfully after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start within 30 seconds"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          # Hit the health endpoint and display the response
          echo "Health check response:"
          curl -s http://localhost:5000/api/health | jq .

          # Verify the health endpoint returns valid JSON with a status field
          STATUS=$(curl -s http://localhost:5000/api/health | jq -r '.status')
          echo "Server status: $STATUS"

          if [ -z "$STATUS" ] || [ "$STATUS" = "null" ]; then
            echo "Health check did not return a valid status"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          echo "Smoke test passed"
          kill $SERVER_PID 2>/dev/null || true
          
      # Deploy to Azure Web apps
      - name: 'Run Azure webapp deploy action using publish profile credentials'
        uses: azure/webapps-deploy@v3
        with: 
          app-name: ${{ env.AZURE_WEBAPP_NAME }} # Replace with your app name
          publish-profile: ${{ secrets.azureWebAppPublishProfile  }} # Define secret variable in repository settings as per action documentation
          package: '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/myapp'

# For more samples to get started with GitHub Action workflows to deploy to Azure, refer to https://github.com/Azure/actions-workflow-samples
