name: Health Check

on:
  schedule:
    # Run every Monday at 8:00 AM UTC
    - cron: "0 8 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions: {}

jobs:
  site-availability:
    name: Site Availability Check
    runs-on: ubuntu-latest

    steps:
      - name: Check deployed site
        run: |
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 30 https://jeffpardy.azurewebsites.net/)
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::error::Site returned HTTP $HTTP_STATUS"
            exit 1
          fi
